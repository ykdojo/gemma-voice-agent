<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Paper Voice Agent</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; margin: 0; }
  body {
    font-family: -apple-system, system-ui, sans-serif;
    display: flex; flex-direction: column; height: 100dvh;
    background: light-dark(#f6f7f9, #101418); color: light-dark(#1b1f24, #e8eaed);
  }
  header { padding: 14px 18px; font-weight: 600; border-bottom: 1px solid light-dark(#e3e6ea, #2a3038); }
  header small { display: block; font-weight: 400; opacity: .6; font-size: 12px; }
  #chat { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
  .msg { max-width: 82%; padding: 10px 14px; border-radius: 16px; line-height: 1.4; white-space: pre-wrap; }
  .user { align-self: flex-end; background: #2f6fed; color: #fff; border-bottom-right-radius: 4px; }
  .bot { align-self: flex-start; background: light-dark(#fff, #1d232b); border: 1px solid light-dark(#e3e6ea, #2a3038); border-bottom-left-radius: 4px; }
  .thinking { opacity: .55; font-style: italic; }
  form { display: flex; gap: 8px; padding: 12px; border-top: 1px solid light-dark(#e3e6ea, #2a3038); padding-bottom: calc(12px + env(safe-area-inset-bottom)); }
  input {
    flex: 1; padding: 12px 16px; font-size: 16px; border-radius: 22px;
    border: 1px solid light-dark(#d4d8dd, #3a414b); background: light-dark(#fff, #1d232b); color: inherit; outline: none;
  }
  button {
    width: 46px; height: 46px; border-radius: 50%; border: none; font-size: 19px;
    background: #2f6fed; color: #fff; cursor: pointer; flex-shrink: 0;
  }
  #mic.recording { background: #d93025; animation: pulse 1.2s infinite; }
  @keyframes pulse { 50% { transform: scale(1.12); } }
</style>
</head>
<body>
<header>Paper Voice Agent<small>Ask about scientific papers, by text or voice</small></header>
<div id="chat"></div>
<form id="form">
  <input id="text" placeholder="Ask a question..." autocomplete="off">
  <button type="submit" title="Send">&#10148;</button>
  <button type="button" id="mic" title="Hold to talk / tap to toggle">&#127908;</button>
</form>
<script>
const chat = document.getElementById("chat");
const form = document.getElementById("form");
const textEl = document.getElementById("text");
const micBtn = document.getElementById("mic");

function add(cls, content) {
  const div = document.createElement("div");
  div.className = "msg " + cls;
  div.textContent = content;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

async function send(body) {
  const thinking = add("bot thinking", "Thinking...");
  try {
    const resp = await fetch("/chat", { method: "POST", body });
    const data = await resp.json();
    thinking.classList.remove("thinking");
    thinking.textContent = data.text || data.error || "Something went wrong.";
    if (data.audio_wav_base64) new Audio("data:audio/wav;base64," + data.audio_wav_base64).play();
  } catch (e) {
    thinking.textContent = "Request failed: " + e;
  }
}

form.addEventListener("submit", (e) => {
  e.preventDefault();
  const q = textEl.value.trim();
  if (!q) return;
  textEl.value = "";
  add("user", q);
  const fd = new FormData();
  fd.append("text", q);
  send(fd);
});

let recorder = null, chunks = [];
micBtn.addEventListener("click", async () => {
  if (recorder && recorder.state === "recording") { recorder.stop(); return; }
  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  chunks = [];
  recorder = new MediaRecorder(stream);
  recorder.ondataavailable = (e) => chunks.push(e.data);
  recorder.onstop = () => {
    stream.getTracks().forEach((t) => t.stop());
    micBtn.classList.remove("recording");
    const blob = new Blob(chunks, { type: recorder.mimeType || "audio/webm" });
    add("user", "\u{1F3A4} (voice message)");
    const fd = new FormData();
    fd.append("audio", blob, "question.webm");
    send(fd);
  };
  recorder.start();
  micBtn.classList.add("recording");
});
</script>
</body>
</html>
